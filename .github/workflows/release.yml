name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"

      - name: Verify tag matches package version
        run: test "v$(uv version --short)" = "$GITHUB_REF_NAME"

      - name: Run lint
        run: uv run --locked ruff check .

      - name: Run tests
        run: uv run --locked pytest

      - name: Build distributions
        run: uv build --no-sources --clear

      - name: Check distributions
        run: uvx --from twine==6.2.0 twine check dist/*

      - name: Check bundled model
        run: python -m zipfile -l dist/*.whl | grep -F "scarecrow/data/license-plate-finetune-v1n.pt2"

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scarecrow-alpr-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish distribution to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/scarecrow-alpr
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scarecrow-alpr-dist
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
